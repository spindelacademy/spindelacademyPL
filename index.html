<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>멈추어라 순간이여 너는 참 아름답구나</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0b;
    --panel:#111113;
    --panel2:#17171a;
    --border:#252528;
    --border-strong:#38383c;
    --text:#e9e7e2;
    --text-dim:#918f8a;
    --text-mute:#5c5b58;
    --accent:#c9a668;
    --physical:#9ea1a8;
    --fire:#c96a45;
    --frost:#5fa3bd;
    --lightning:#c9b25a;
    --storm:#4f9482;
    --dark:#8b7bb0;
    --danger:#c1584f;
    --success:#6a9e75;
    --grade-common:#9298a0;
    --grade-uncommon:#6a9e75;
    --grade-rare:#5f8fbd;
    --grade-legendary:#c9a668;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    padding:2rem 1.25rem 4rem;
    line-height:1.6;
  }
  .wrap{max-width:920px;margin:0 auto;}
  h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:700;letter-spacing:.02em;margin:0;}
  h1{font-size:26px;color:var(--accent);}
  h2{font-size:17px;color:var(--text);}
  h3{font-size:14px;color:var(--text);font-weight:500;}
  p{margin:0;}
  .eyebrow{font-size:12px;color:var(--text-mute);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;}
  header{margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);}
  .nav{display:flex;gap:8px;margin-bottom:1.5rem;}
  .nav button{flex:1;}
  .nav button.active{background:var(--accent);color:#16130f;border-color:var(--accent);font-weight:600;}
  .tab{display:none;}
  .tab.active{display:block;}
  .panel{
    background:linear-gradient(180deg, var(--panel2) 0%, var(--panel) 100%);
    border:1px solid var(--border);
    border-radius:6px;
    padding:1.1rem 1.25rem;
    margin-bottom:1rem;
    box-shadow:0 8px 20px -12px rgba(0,0,0,.5);
  }
  .panel-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.9rem;flex-wrap:wrap;gap:6px;}
  label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px;}
  input[type=text], input[type=number], input[type=password], input[type=file], select{
    width:100%;
    background:var(--bg);
    border:1px solid var(--border-strong);
    border-radius:6px;
    padding:8px 10px;
    color:var(--text);
    font-family:inherit;
    font-size:14px;
  }
  input:focus, select:focus{outline:1px solid var(--accent);}
  input:-webkit-autofill,
  input:-webkit-autofill:hover,
  input:-webkit-autofill:focus{
    -webkit-text-fill-color: var(--text);
    -webkit-box-shadow: 0 0 0px 1000px var(--bg) inset;
    box-shadow: 0 0 0px 1000px var(--bg) inset;
    transition: background-color 9999s ease-in-out 0s;
  }
  button{
    font-family:inherit;
    font-size:12.5px;
    letter-spacing:.02em;
    color:var(--text-dim);
    background:transparent;
    border:1px solid var(--border-strong);
    border-radius:4px;
    padding:9px 14px;
    cursor:pointer;
    transition:border-color .18s ease, color .18s ease, background .18s ease, transform .15s ease, box-shadow .18s ease;
  }
  button:hover:not(:disabled){border-color:var(--accent);color:var(--accent);transform:translateY(-1px);}
  button:active:not(:disabled){transform:translateY(0) scale(.97);}
  button:disabled{opacity:.4;cursor:not-allowed;}
  button.primary{
    background:linear-gradient(165deg,#dcb87f 0%,var(--accent) 55%,var(--accent-soft,#a4854f) 100%);
    color:#16130f;border-color:var(--accent);font-weight:600;
    box-shadow:0 6px 16px -6px rgba(201,166,104,.45);
  }
  button.primary:hover:not(:disabled){color:#16130f;opacity:.92;transform:translateY(-2px);box-shadow:0 10px 22px -8px rgba(201,166,104,.55);}
  button.primary:active:not(:disabled){transform:translateY(0) scale(.97);box-shadow:0 4px 10px -6px rgba(201,166,104,.4);}
  button.wide{width:100%;}
  .row{display:flex;gap:8px;flex-wrap:wrap;}
  .char-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:9px 10px;background:var(--panel2);border:1px solid var(--border);
    border-radius:8px;margin-bottom:6px;gap:10px;flex-wrap:wrap;
  }
  .char-name{font-weight:600;font-size:14px;min-width:80px;}
  .badges{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
  .badge{
    font-size:11px;padding:2px 7px;border-radius:20px;
    border:1px solid var(--el-color);color:var(--el-color);
    white-space:nowrap;
  }
  .badge.dim{color:var(--text-mute);border-color:var(--border);}
  .filter-chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.6rem;}
  .filter-chip{
    font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border-strong);
    background:var(--panel2);color:var(--text-dim);cursor:pointer;
  }
  .filter-chip.active{border-color:var(--chip-color, var(--accent));color:var(--chip-color, var(--accent));background:rgba(201,166,104,.08);}
  .autocomplete-wrap{position:relative;}
  .autocomplete-list{
    position:absolute;top:100%;left:0;right:0;z-index:20;
    background:var(--panel2);border:1px solid var(--border-strong);border-top:none;
    border-radius:0 0 8px 8px;max-height:220px;overflow-y:auto;display:none;
  }
  .autocomplete-list.show{display:block;}
  .autocomplete-item{padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);}
  .autocomplete-item:last-child{border-bottom:none;}
  .autocomplete-item:hover{background:var(--panel);color:var(--accent);}
  .autocomplete-item .ac-meta{font-size:11px;color:var(--text-dim);margin-left:6px;}
  .char-summary-wrap{margin-bottom:8px;}
  .char-summary-card{
    background:var(--panel2);border:1px solid var(--border);border-radius:6px;
    padding:10px 12px;cursor:pointer;
    display:flex;align-items:center;gap:12px;
  }
  .char-summary-card:hover{border-color:var(--accent);}
  .char-summary-thumb{
    width:42px;height:42px;border-radius:8px;background:var(--panel);
    border:1px solid var(--border-strong);flex-shrink:0;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--accent);
  }
  .char-summary-thumb img{width:100%;height:100%;object-fit:cover;}
  .char-summary-body{flex:1;min-width:0;}
  .char-summary-top{display:flex;align-items:center;margin-bottom:6px;gap:8px;flex-wrap:wrap;}
  .char-summary-top .char-name{font-size:14px;}
  .char-summary-pw{font-size:11px;color:var(--text-mute);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 8px;}
  .hp-mini{font-size:11px;color:var(--text-dim);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 9px;}
  .char-summary-actions{margin-top:6px;}
  .party-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.75rem;}
  .slot{
    border:1px dashed var(--border-strong);border-radius:8px;
    padding:10px;min-height:60px;font-size:13px;color:var(--text-mute);
    display:flex;flex-direction:column;justify-content:center;gap:6px;
  }
  .slot.filled{border-style:solid;border-color:var(--accent);color:var(--text);background:var(--panel2);}
  .empty-note{color:var(--text-mute);font-size:13px;}
  .form-row{display:grid;grid-template-columns:1fr 90px auto;gap:8px;align-items:end;margin-bottom:1rem;}
  @media(max-width:520px){.form-row{grid-template-columns:1fr;}}
  .item-slots{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:1rem 0;}
  @media(max-width:560px){.item-slots{grid-template-columns:repeat(2,1fr);}}
  .item-slot{
    border:1px solid var(--border);border-top:3px solid var(--el-color, var(--border));border-radius:6px;
    padding:12px 8px;min-height:76px;
    background:var(--panel2);display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:10px;font-size:12px;
  }
  .item-slot.empty{border-top-color:var(--border);border-style:dashed;color:var(--text-mute);}
  .item-slot .el-info{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .item-slot .el-name{font-weight:600;font-size:13px;line-height:1.3;}
  .item-slot .el-value{
    font-size:11px;padding:2px 9px;border-radius:20px;
    border:1px solid var(--el-color);color:var(--el-color);white-space:nowrap;
  }
  .item-slot .el-grade{font-size:10px;font-weight:600;letter-spacing:.02em;}
  .item-slot button{margin-top:2px;font-size:11px;padding:4px 6px;}

  /* ---- player portal: character sheet ---- */
  .page-arch{
    position:fixed;top:0;left:50%;transform:translateX(-50%);
    width:min(72vw,560px);height:66vh;opacity:.4;pointer-events:none;z-index:0;
  }
  .page-arch svg{width:100%;height:100%;display:block;}
  .page-glow{
    position:fixed;top:-10%;left:50%;transform:translateX(-50%);
    width:70vw;height:50vh;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse 60% 55% at 50% 0%, rgba(201,166,104,.10), transparent 70%);
    animation:glow-breathe 7s ease-in-out infinite;
  }
  @keyframes glow-breathe{
    0%,100%{opacity:.7;}
    50%{opacity:1;}
  }
  .ember{
    position:fixed;bottom:-10px;border-radius:50%;
    background:var(--accent);pointer-events:none;z-index:0;
    box-shadow:0 0 6px 1px rgba(201,166,104,.5);
    animation:ember-rise linear infinite;
  }
  @keyframes ember-rise{
    0%{transform:translateY(0) translateX(0);opacity:0;}
    10%{opacity:.55;}
    90%{opacity:.35;}
    100%{transform:translateY(-92vh) translateX(var(--drift,12px));opacity:0;}
  }
  #login-view, #char-view{position:relative;z-index:1;}
  .login-hero{text-align:center;margin:4rem 0 2rem;}
  .login-eyebrow{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--text-mute);margin-bottom:1.2rem;}
  .login-hero-title{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(24px,6vw,34px);line-height:1.25;color:var(--text);margin-bottom:1.1rem;letter-spacing:.01em;}
  .login-hero-divider{width:1px;height:40px;background:linear-gradient(var(--border),var(--accent));opacity:.6;margin:0 auto 1.1rem;}
  .login-hero-sub{font-size:13px;color:var(--text-dim);}
  .login-panel{
    max-width:360px;margin:0 auto;padding:1.85rem 1.6rem;
    background:linear-gradient(165deg, var(--panel2) 0%, var(--panel) 100%);
    border:1px solid var(--border);
    box-shadow:0 20px 40px -20px rgba(0,0,0,.6);
  }
  .login-panel input{padding:12px 13px;font-size:15px;margin-bottom:.15rem;}
  .login-panel label{margin-top:.3rem;}
  .login-panel button{padding:13px;font-size:13px;letter-spacing:.06em;margin-top:1.1rem;}
  .login-hint{text-align:center;margin-top:1.1rem;}
  .portal-topbar{display:flex;justify-content:flex-end;margin-bottom:.75rem;}
  .char-sheet-header{
    display:flex;flex-wrap:wrap;gap:10px;
    margin-bottom:1rem;
  }
  .sheet-box{
    background:linear-gradient(165deg, var(--panel2) 0%, var(--panel) 100%);
    border:1px solid var(--border);border-radius:8px;
    padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;
    box-shadow:0 10px 22px -14px rgba(0,0,0,.55);
  }
  .sheet-portrait-box{flex:1.6 1 190px;gap:14px;padding:26px 16px;}
  .sheet-vitals-box{flex:1 1 150px;flex-direction:column;gap:16px;}
  .vitals-row{display:flex;flex-direction:column;align-items:center;width:100%;}
  .portrait-frame-wrap{
    position:relative;
    width:min(349px, 62vw);
    aspect-ratio:349/334;
    max-width:100%;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;margin:0 auto;
  }
  .portrait-frame-overlay{
    position:absolute;top:0.6%;left:-0.29%;
    width:100%;height:100%;
    pointer-events:none;z-index:2;
  }
  .portrait-frame{
    width:48.14%;height:50.30%;border-radius:50%;
    background:var(--panel2);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;flex-shrink:0;cursor:pointer;
    position:relative;z-index:1;
  }
  .portrait-frame:hover::after{
    content:'변경';font-size:12px;color:#fff;
    position:absolute;inset:0;background:rgba(0,0,0,.45);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
  }
  .portrait-frame img{width:100%;height:100%;object-fit:cover;}
  .portrait-placeholder{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,9vw,56px);color:var(--accent);}
  .char-sheet-name{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:22px;color:var(--text);}
  .sheet-box-label{
    font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--text-dim);
    letter-spacing:.08em;text-transform:uppercase;margin-bottom:9px;
  }
  .hp-visual{display:flex;align-items:center;gap:12px;}
  .hp-visual-bar{width:10px;height:44px;background:var(--bg);border-radius:5px;overflow:hidden;display:flex;align-items:flex-end;border:1px solid var(--border);}
  .hp-visual-fill{width:100%;background:linear-gradient(180deg,#e2564f,#8a3f3f);border-radius:4px;transition:height .3s;}
  .sheet-box-value{font-size:26px;font-weight:700;color:var(--text);font-family:'Cormorant Garamond',serif;}
  .help-dots-row{display:flex;gap:7px;margin-bottom:8px;}
  .help-dot{width:14px;height:14px;border-radius:50%;display:inline-block;border:1.5px solid var(--accent);}
  .help-dot.filled{background:var(--accent);}

  .element-icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;}
  .element-icon-tile{
    border:1px solid var(--border);border-top:3px solid var(--el-color);border-radius:8px;
    padding:8px 2px 7px;text-align:center;background:var(--panel2);
  }
  .element-icon-tile .element-icon{font-size:16px;margin-bottom:5px;filter:grayscale(.15);}
  .element-icon-tile .element-value{font-size:18px;font-weight:700;color:var(--text);font-family:'Cormorant Garamond',serif;}
  .element-icon-tile .element-name{font-size:9px;color:var(--text-dim);margin-top:3px;}

  .item-slot[draggable="true"]{cursor:grab;}
  .item-slot[draggable="true"]:active{cursor:grabbing;}
  #transfer-dropzone{
    border:2px dashed var(--border-strong);border-radius:6px;
    padding:16px 14px;min-height:64px;color:var(--text-mute);font-size:13px;
    margin-bottom:1rem;transition:background .15s,border-color .15s,color .15s;
    display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:8px;
  }
  #transfer-dropzone.dropzone-filled{border-style:solid;border-color:var(--accent);justify-content:flex-start;}
  #dropzone-placeholder{color:var(--text-mute);font-size:13px;}
  .drop-chip{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--panel2);border:1px solid var(--el-color, var(--accent));border-radius:20px;
    padding:5px 6px 5px 12px;font-size:12px;color:var(--text);
  }
  .drop-chip .chip-remove{
    width:18px;height:18px;border-radius:50%;border:none;background:var(--bg);color:var(--text-dim);
    display:flex;align-items:center;justify-content:center;font-size:13px;line-height:1;cursor:pointer;padding:0;
  }
  .drop-chip .chip-remove:hover{color:var(--danger);}
  .drag-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.85;}
  .drop-target-hover-candidate.dropzone-hover{border-color:var(--accent);background:rgba(201,166,104,.08);}

  .transfer-craft-row{display:flex;gap:16px;flex-wrap:wrap;}
  .transfer-craft-col{flex:1 1 220px;min-width:0;}
  .tc-subtitle{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--text-dim);margin:0 0 .6rem;letter-spacing:.02em;}

  .craft-row{display:flex;align-items:center;justify-content:center;gap:8px;}
  .craft-slot{
    flex:1;min-width:0;max-width:110px;min-height:84px;border:2px dashed var(--border-strong);border-radius:6px;
    display:flex;align-items:center;justify-content:center;text-align:center;font-size:11px;color:var(--text-mute);
    padding:8px;cursor:pointer;
  }
  .craft-slot.filled{border-style:solid;border-color:var(--accent);color:var(--text);font-weight:600;font-size:12px;}
  .craft-symbol{font-size:22px;color:var(--text-mute);font-family:'Cormorant Garamond',serif;flex-shrink:0;}

  .skill-row{display:grid;grid-template-columns:72px 1fr;gap:14px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
  .skill-row:last-child{border-bottom:none;}
  .skill-level-tag{
    font-weight:700;font-size:11.5px;line-height:1.4;color:var(--el-color);border:1px solid var(--el-color);
    border-radius:6px;padding:5px 2px;text-align:center;white-space:nowrap;
  }
  .skill-desc{font-size:13px;color:var(--text-dim);line-height:1.55;margin:0;}
  #pc-level-row{margin-bottom:.85rem;}
  #pc-skills-list{margin-bottom:1rem;}

  #battle-active{display:none;}
  .status-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;margin-bottom:1rem;}
  .status-card{
    background:var(--panel);border:1px solid var(--border);border-radius:6px;
    padding:10px;
  }
  .status-card.dead{opacity:.45;}
  .status-card .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .status-card .name{font-weight:600;font-size:13px;}
  .hp-text{font-size:14px;font-weight:600;margin-bottom:5px;}
  .bar-outer{height:7px;background:var(--bg);border-radius:5px;overflow:hidden;margin-bottom:8px;}
  .bar-inner{height:100%;transition:width .25s;}
  .status-tags{display:flex;gap:4px;flex-wrap:wrap;}
  .tag{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--panel2);color:var(--text-dim);border:1px solid var(--border);}
  .tag.fire{color:var(--fire);border-color:var(--fire);}
  .tag.frost{color:var(--frost);border-color:var(--frost);}
  .tag.dark{color:var(--dark);border-color:var(--dark);}
  .target-btn{width:100%;margin-top:6px;}
  #floor-label{font-size:13px;color:var(--text-dim);}
  #order-label{font-size:12px;color:var(--text-mute);margin-top:8px;}
  #actor-prompt{
    background:var(--panel2);border:1px solid var(--accent);border-radius:8px;
    padding:10px 12px;margin-bottom:.75rem;font-size:13px;
  }
  #actor-prompt b{color:var(--accent);}
  #log{
    background:var(--panel);border:1px solid var(--border);border-radius:6px;
    padding:.75rem 1rem;height:230px;overflow-y:auto;
    display:flex;flex-direction:column-reverse;
    font-size:13px;
  }
  #log p{margin:0 0 6px;line-height:1.5;}
  .log-round{color:var(--text-dim);font-weight:600;margin-top:4px;}
  .log-fire{color:var(--fire);}
  .log-frost{color:var(--frost);}
  .log-dark{color:var(--dark);}
  .log-storm{color:var(--storm);}
  .log-danger{color:var(--danger);}
  .log-success{color:var(--success);}
  .footnote{font-size:12px;color:var(--text-mute);margin-top:.4rem;}
</style>
</head>
<body>
<div class="page-arch" aria-hidden="true">
  <svg viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M40 500 V180 C40 80 110 20 200 20 C290 20 360 80 360 180 V500" stroke="#2a2a2e" stroke-width="1"/>
    <path d="M75 500 V190 C75 100 130 55 200 55 C270 55 325 100 325 190 V500" stroke="#212124" stroke-width="1"/>
  </svg>
</div>
<div class="page-glow" aria-hidden="true"></div>
<div id="ember-field" aria-hidden="true"></div>

<div class="wrap" id="player-app" style="display:none;">

  <div id="login-view">
    <div class="login-hero">
      <div class="login-eyebrow">Verweile doch. Du bist so schön.</div>
      <h1 class="login-hero-title">멈추어라 순간이여<br>너는 참 아름답구나</h1>
      <div class="login-hero-divider"></div>
      <p class="login-hero-sub">스핀델 아카데미에 오신 것을 환영합니다.</p>
    </div>
    <div class="panel login-panel">
      <label>캐릭터 이름</label>
      <input type="text" id="login-name" placeholder="캐릭터 이름을 입력하세요">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import {
  getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* ====== 여기에 Firebase 콘솔에서 복사한 firebaseConfig 값을 붙여넣으세요 ====== */
const firebaseConfig = {
  apiKey: "AIzaSyD9rJsF_Jbut0GiiuhEKQFczVqvgmWfLOc",
  authDomain: "spindel-academy.firebaseapp.com",
  projectId: "spindel-academy",
  storageBucket: "spindel-academy.firebasestorage.app",
  messagingSenderId: "824092881561",
  appId: "1:824092881561:web:92c008333262ed237e3e08"
};
/* ============================================================ */

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
const auth = getAuth(firebaseApp);
setPersistence(auth, browserLocalPersistence).catch(function(e){ console.error(e); });

/* 캐릭터 이름을 Firebase Auth용 가짜 이메일로 변환 (플레이어에게는 여전히 "이름"으로만 보임) */
function nameToEmail(name){
  const slug = name.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_가-힣]/g,'');
  return 'char_'+encodeURIComponent(slug)+'@spindelacademy.local';
}

(function(){

  const ELEMENTS = [
    {key:'physical', name:'물리', color:'var(--physical)', icon:'\u2694\ufe0f'},
    {key:'fire', name:'화염', color:'var(--fire)', icon:'\ud83d\udd25'},
    {key:'frost', name:'빙결', color:'var(--frost)', icon:'\u2744\ufe0f'},
    {key:'lightning', name:'전격', color:'var(--lightning)', icon:'\u26a1'},
    {key:'storm', name:'폭풍', color:'var(--storm)', icon:'\ud83c\udf2a\ufe0f'},
    {key:'dark', name:'암흑', color:'var(--dark)', icon:'\u25fc\ufe0f'}
  ];
  const ELEMENT_NAME = {};
  const ELEMENT_COLOR = {};
  ELEMENTS.forEach(function(e){ ELEMENT_NAME[e.key]=e.name; ELEMENT_COLOR[e.key]=e.color; });

  const GRADES = [
    {key:'common', name:'일반', color:'var(--grade-common)'},
    {key:'uncommon', name:'고급', color:'var(--grade-uncommon)'},
    {key:'rare', name:'희귀', color:'var(--grade-rare)'},
    {key:'legendary', name:'전설', color:'var(--grade-legendary)'}
  ];
  const GRADE_NAME = {};
  const GRADE_COLOR = {};
  GRADES.forEach(function(g){ GRADE_NAME[g.key]=g.name; GRADE_COLOR[g.key]=g.color; });

  const LEVEL_BONUS = {
    physical: {3:8, 6:15, 10:30},
    fire: {6:8},
    frost: {6:5},
    lightning: {6:4},
    storm: {},
    dark: {10:10}
  };

  const SKILL_TEXT = {
    physical: {
      3: '물리 +8. 공격 시 물리 능력치(%)만큼의 확률로 [치명타] 발동 \u2014 물리 능력치의 2배만큼 추가 피해.',
      6: '물리 +15.',
      10: '물리 +30.'
    },
    fire: {
      3: '공격하면 [화상] 발동. 라운드가 종료될 때마다 화염 속성 피해.',
      6: '화염 +8.',
      10: '[화상] 피해가 연속 두 번 발생.'
    },
    frost: {
      3: '공격하면 [동상] 발동. 동상에 걸린 적은 행동할 수 없으며, 공격받으면 해제됨.',
      6: '빙결 +5.',
      10: '동상이 풀릴 때 동상을 건 캐릭터의 빙결 능력치만큼 추가 피해.'
    },
    lightning: {
      3: '공격하면 [벼락] 발동. 대상 외 다른 1명에게 전격 피해.',
      6: '전격 +4. [벼락]이 다른 2명에게 적용.',
      10: '[벼락] 발동 시 전격 능력치(%)의 확률로 재발동 (무한 연쇄 가능).'
    },
    storm: {
      3: '[회피] 스택 5 획득. 스택 1당 도주 성공률 +10%. 도주할 때마다 스택 1 소모.',
      6: '공격하면 한 번 더 공격.',
      10: '남은 [회피] 스택 수 \u00d7 4만큼 폭풍 능력치 획득.'
    },
    dark: {
      3: '공격하면 [실명] 부여 (대상 공격 50% 확률로 빗나감). 실명된 적을 공격할 때마다 암흑 능력치 임시 +2 (최대 4회, 이번 시련의 탑에서만 유지).',
      6: '실명 대상 공격 시 임시 상승량이 +3으로 증가.',
      10: '암흑 +10.'
    }
  };

  const DEFAULT_MAX_HP = 80;
  const INVENTORY_MAX = 10;

  const MONSTER_TEMPLATES = [
    {id:'m1', name:'고블린 전사', hp:45, atkMin:5, atkMax:8, spMin:12, spMax:16, spd:6},
    {id:'m2', name:'슬라임', hp:30, atkMin:4, atkMax:6, spMin:10, spMax:13, spd:3},
    {id:'m3', name:'오크 궁수', hp:60, atkMin:6, atkMax:9, spMin:14, spMax:18, spd:8}
  ];

  const state = {
    party: [],
    monsters: [],
    floor: 1,
    maxFloor: 5,
    round: 1,
    blockCount: 0,
    actionQueue: [],
    currentActorIdx: 0,
    over: false
  };

  const $ = (id) => document.getElementById(id);
  function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

  /* ---------- inventory-derived stats ---------- */

  function itemsOf(player, key){ return (player.inventory||[]).filter(function(i){ return resolveItem(i).element===key; }); }
  function levelOf(player, key){ return itemsOf(player,key).length; }

  function computeStat(player, key){
    const items = itemsOf(player, key);
    const itemSum = items.reduce(function(s,i){ return s+resolveItem(i).value; }, 0);
    let bonus = 0;
    const table = LEVEL_BONUS[key];
    [3,6,10].forEach(function(lvl){
      if(items.length >= lvl && table[lvl]) bonus += table[lvl];
    });
    let stat = itemSum + bonus;
    if(key === 'storm' && items.length >= 10){
      stat += (player.evasionStacks||0) * 4;
    }
    if(key === 'dark'){
      stat += (player.darkTempBonus||0);
    }
    return stat;
  }

  function elementSummary(player){
    return ELEMENTS.map(function(el){
      const lvl = levelOf(player, el.key);
      if(lvl === 0) return null;
      const stat = computeStat(player, el.key);
      return '<span class="badge" style="--el-color:'+el.color+'">'+el.name+' '+stat+' \u00b7 Lv.'+lvl+'</span>';
    }).filter(Boolean).join('') || '<span class="badge dim">능력치 없음</span>';
  }

  function helpRequestsOf(player){ return player.helpRequests !== undefined ? player.helpRequests : 2; }
  function maxHpOf(player){ return player.maxHp || DEFAULT_MAX_HP; }
  function currentHpOf(player){ return player.currentHp !== undefined ? player.currentHp : maxHpOf(player); }

  function allStatsSummary(player){
    return ELEMENTS.map(function(el){
      const lvl = levelOf(player, el.key);
      const stat = computeStat(player, el.key);
      const dim = lvl === 0 ? ' dim' : '';
      return '<span class="badge'+dim+'" style="--el-color:'+el.color+'">'+el.name+' '+stat+' \u00b7 Lv.'+lvl+'</span>';
    }).join('');
  }

  /* ---------- storage (Firebase Firestore) ---------- */

  async function savePlayer(player){
    try{
      await setDoc(doc(db, 'players', player.id), player);
      return true;
    }catch(e){ console.error('savePlayer 실패:', e); return false; }
  }
  async function getMyPlayerDoc(uid){
    try{
      const snap = await getDoc(doc(db, 'players', uid));
      return snap.exists() ? snap.data() : null;
    }catch(e){ console.error('getMyPlayerDoc 실패:', e); return null; }
  }
  async function deletePlayerFromStorage(id){
    try{ await deleteDoc(doc(db, 'players', id)); }catch(e){ console.error('deletePlayer 실패:', e); }
  }

  async function saveArtifact(artifact){
    try{
      await setDoc(doc(db, 'artifacts', artifact.id), artifact);
      return true;
    }catch(e){ console.error('saveArtifact 실패:', e); return false; }
  }
  async function getArtifactById(id){
    try{
      const snap = await getDoc(doc(db, 'artifacts', id));
      return snap.exists() ? snap.data() : null;
    }catch(e){ console.error('getArtifactById 실패:', e); return null; }
  }
  async function deleteArtifactFromStorage(id){
    try{ await deleteDoc(doc(db, 'artifacts', id)); }catch(e){ console.error('deleteArtifact 실패:', e); }
  }

  async function getItemCatalogById(id){
    try{
      const snap = await getDoc(doc(db, 'items', id));
      return snap.exists() ? snap.data() : null;
    }catch(e){ console.error('getItemCatalogById 실패:', e); return null; }
  }

  /* 도감 전체를 훑어보는 게 아니라, 이 캐릭터가 "이미 가진" 항목의 도감 정보만 하나씩 가져와 캐싱한다.
     아직 아무에게도 지급되지 않은 아티팩트/아이템은 이 방식으로는 절대 조회할 수 없다. */
  async function prefetchCatalogFor(player){
    const artifactIds = Array.from(new Set((player.inventory||[]).map(function(i){ return i.sourceArtifactId; }).filter(Boolean)));
    const itemIds = Array.from(new Set((player.items||[]).map(function(i){ return i.sourceItemId; }).filter(Boolean)));
    for(const id of artifactIds){
      if(!artifactCatalogCache.find(function(a){ return a.id === id; })){
        const data = await getArtifactById(id);
        if(data) artifactCatalogCache.push(data);
      }
    }
    for(const id of itemIds){
      if(!itemCatalogCache.find(function(a){ return a.id === id; })){
        const data = await getItemCatalogById(id);
        if(data) itemCatalogCache.push(data);
      }
    }
  }

  /* ---------- 서버 함수 (Netlify Functions) 호출 ---------- */
  /* admin.html과 같은 Netlify 사이트에 배포된 함수 주소로 바꿔주세요. */
  const FUNCTIONS_BASE = 'https://spindelacademy-admin.netlify.app/.netlify/functions';

  async function callServerFunction(name, payload){
    if(!auth.currentUser) return { success:false, message:'로그인이 필요합니다.' };
    const idToken = await auth.currentUser.getIdToken();
    try{
      const res = await fetch(FUNCTIONS_BASE+'/'+name, {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify(Object.assign({ idToken: idToken }, payload))
      });
      return await res.json();
    }catch(e){
      console.error('callServerFunction 실패:', e);
      return { success:false, message:'서버에 연결할 수 없습니다.' };
    }
  }

  async function logAction(playerName, action, details){
    try{
      const entry = {
        id: 'log_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
        timestamp: Date.now(),
        playerName: playerName || '',
        action: action,
        details: details || {}
      };
      await setDoc(doc(db, 'logs', entry.id), entry);
    }catch(e){ console.error('logAction 실패:', e); }
  }

  let artifactCatalogCache = [];
  let itemCatalogCache = [];

  /* 인벤토리 아이템의 "실제 값"을 도감에서 실시간으로 가져온다. */
  function resolveItem(item){
    if(item.sourceArtifactId){
      const art = artifactCatalogCache.find(function(a){ return a.id === item.sourceArtifactId; });
      if(art){
        return { element: art.element, value: art.value, name: art.name, description: art.description||'', grade: art.grade||'common' };
      }
    }
    return { element: item.element, value: item.value, name: item.name||'', description: item.description||'', grade: item.grade||'common' };
  }

  /* 일반 아이템(비-아티팩트)의 실제 값을 아이템 도감에서 실시간으로 가져온다. */
  function resolveGeneralItem(item){
    if(item.sourceItemId){
      const it = itemCatalogCache.find(function(a){ return a.id === item.sourceItemId; });
      if(it) return { name: it.name, description: it.description||'' };
    }
    return { name: item.name||'', description: item.description||'' };
  }

  /* ============ 플레이어 화면 (portal mode) ============ */

  let currentPlayerDoc = null;

  $('btn-login').addEventListener('click', async function(){
    const name = $('login-name').value.trim();
    const password = $('login-password').value;
    if(!name || !password){
      $('login-status').textContent = '캐릭터 이름과 비밀번호를 모두 입력하세요.';
      return;
    }
    try{
      await signInWithEmailAndPassword(auth, nameToEmail(name), password);
      $('login-status').textContent = '';
      /* 이후 처리는 onAuthStateChanged에서 이어집니다 */
    }catch(e){
      $('login-status').textContent = '캐릭터 이름 또는 비밀번호가 올바르지 않습니다.';
    }
  });

  $('btn-logout').addEventListener('click', async function(){
    const outgoingName = currentPlayerDoc ? currentPlayerDoc.name : '';
    if(outgoingName) await logAction(outgoingName, '로그아웃', {});
    try{ await signOut(auth); }catch(e){}
    $('login-name').value = '';
    $('login-password').value = '';
    $('char-view').style.display = 'none';
    $('login-view').style.display = 'block';
  });

  onAuthStateChanged(auth, async function(user){
    if(!user){
      currentPlayerDoc = null;
      $('char-view').style.display = 'none';
      $('login-view').style.display = 'block';
      return;
    }
    currentPlayerDoc = await getMyPlayerDoc(user.uid);
    if(!currentPlayerDoc){
      $('login-status').textContent = '캐릭터 정보를 찾을 수 없습니다. 운영자에게 문의하세요.';
      await signOut(auth);
      return;
    }
    await prefetchCatalogFor(currentPlayerDoc);
    $('login-view').style.display = 'none';
    $('char-view').style.display = 'block';
    renderPortalChar();
    logAction(currentPlayerDoc.name, '로그인', {});
  });

  function currentPortalPlayer(){
    return currentPlayerDoc;
  }

  let pendingPortraitDataUrl = null;
  let dragState = null;
  let stagedTransferEntries = [];
  let craftSlots = [null, null];

  function renderPortalChar(){
    const p = currentPortalPlayer();
    if(!p) return;

    $('pc-name').textContent = p.name;

    if(p.imageUrl){
      $('pc-portrait').src = p.imageUrl;
      $('pc-portrait').style.display = 'block';
      $('pc-portrait-placeholder').style.display = 'none';
    } else {
      $('pc-portrait').style.display = 'none';
      $('pc-portrait-placeholder').style.display = 'flex';
      $('pc-portrait-placeholder').textContent = (p.name||'?').charAt(0);
    }
    pendingPortraitDataUrl = null;
    $('pc-image-input').value = '';

    const maxHp = maxHpOf(p);
    const curHp = Math.max(0, Math.min(maxHp, currentHpOf(p)));
    $('pc-hp-text').textContent = curHp;
    $('pc-hp-fill').style.height = (maxHp>0 ? (curHp/maxHp*100) : 0)+'%';

    const helpLeft = helpRequestsOf(p);
    const dots = [];
    for(let i=0;i<2;i++){
      dots.push('<span class="help-dot'+(i<helpLeft?' filled':'')+'"></span>');
    }
    $('pc-help-dots').innerHTML = dots.join('');
    $('pc-help-text').textContent = helpLeft+' / 2';

    $('pc-element-grid').innerHTML = ELEMENTS.map(function(el){
      const stat = computeStat(p, el.key);
      return '<div class="element-icon-tile" style="--el-color:'+el.color+'">' +
        '<div class="element-icon">'+el.icon+'</div>' +
        '<div class="element-value">'+stat+'</div>' +
        '<div class="element-name">'+el.name+'</div>' +
      '</div>';
    }).join('');

    $('pc-level-row').innerHTML = ELEMENTS.map(function(el){
      const lvl = levelOf(p, el.key);
      const dim = lvl === 0 ? ' dim' : '';
      return '<span class="badge'+dim+'" style="--el-color:'+el.color+'">'+el.name+' Lv.'+lvl+'</span>';
    }).join('');

    let skillsHtml = '';
    ELEMENTS.forEach(function(el){
      const lvl = levelOf(p, el.key);
      [3,6,10].forEach(function(threshold){
        if(lvl >= threshold && SKILL_TEXT[el.key][threshold]){
          skillsHtml += '<div class="skill-row">' +
            '<span class="skill-level-tag" style="--el-color:'+el.color+'">'+el.name+'<br>Lv.'+threshold+'</span>' +
            '<p class="skill-desc">'+SKILL_TEXT[el.key][threshold]+'</p>' +
            '</div>';
        }
      });
    });
    $('pc-skills-list').innerHTML = skillsHtml || '<p class="empty-note" style="margin-bottom:.6rem;">아직 해금된 스킬이 없습니다.</p>';

    if(!p.items) p.items = [];

    stagedTransferEntries = stagedTransferEntries.filter(function(entry){
      if(entry.type === 'artifact') return p.inventory.some(function(i){ return i.id === entry.id; });
      return p.items.some(function(i){ return i.sourceItemId === entry.id; });
    });

    const slotsWrap = $('pc-slots');
    slotsWrap.innerHTML = '';
    for(let i=0;i<INVENTORY_MAX;i++){
      const item = p.inventory[i];
      const slot = document.createElement('div');
      if(item){
        const r = resolveItem(item);
        slot.className = 'item-slot';
        slot.style.setProperty('--el-color', ELEMENT_COLOR[r.element]);
        slot.innerHTML =
          '<div class="el-info"><div class="el-name" style="color:'+ELEMENT_COLOR[r.element]+'">'+(r.name || ELEMENT_NAME[r.element])+'</div>' +
          '<div class="el-value">'+ELEMENT_NAME[r.element]+' +'+r.value+'</div>' +
          '<div class="el-grade" style="color:'+GRADE_COLOR[r.grade]+'">'+GRADE_NAME[r.grade]+'</div></div>';
        makeItemDraggable(slot, {type:'artifact', id:item.id});
      } else {
        slot.className = 'item-slot empty';
        slot.textContent = '빈 슬롯';
      }
      slotsWrap.appendChild(slot);
    }

    const itemSlotsWrap = $('pc-item-slots');
    itemSlotsWrap.innerHTML = '';
    if(p.items.length === 0){
      itemSlotsWrap.innerHTML = '<p class="empty-note">보유한 아이템이 없습니다.</p>';
    } else {
      p.items.forEach(function(item){
        const r = resolveGeneralItem(item);
        const slot = document.createElement('div');
        slot.className = 'item-slot';
        slot.innerHTML =
          '<div class="el-info"><div class="el-name">'+(r.name||'이름 없음')+'</div>' +
          '<div class="el-value">x'+(item.quantity||1)+'</div></div>';
        makeItemDraggable(slot, {type:'item', id:item.sourceItemId});
        itemSlotsWrap.appendChild(slot);
      });
    }

    renderCraftSlotsDisplay();
    $('transfer-status').textContent = '';
    $('portrait-status').textContent = '';
    renderDropzoneChips();
  }

  /* ---- drag & drop / touch transfer (artifacts + items, multi-select, multi-target) ---- */

  function renderDropzoneChips(){
    const p = currentPortalPlayer();
    const dz = $('transfer-dropzone');
    if(!p || stagedTransferEntries.length === 0){
      dz.innerHTML = '<span id="dropzone-placeholder">아티팩트나 아이템을 여기로 끌어다 놓으세요. 여러 개를 한 번에 놓을 수 있어요.</span>';
      dz.classList.remove('dropzone-filled');
      return;
    }
    dz.classList.add('dropzone-filled');
    dz.innerHTML = stagedTransferEntries.map(function(entry){
      let label = '';
      if(entry.type === 'artifact'){
        const item = p.inventory.find(function(i){ return i.id === entry.id; });
        if(!item) return '';
        const r = resolveItem(item);
        label = r.name || ELEMENT_NAME[r.element];
      } else {
        const item = (p.items||[]).find(function(i){ return i.sourceItemId === entry.id; });
        if(!item) return '';
        const r = resolveGeneralItem(item);
        label = (r.name || '아이템') + ' x' + (item.quantity||1);
      }
      return '<span class="drop-chip">'+label+
        '<button type="button" class="chip-remove" data-unstage-type="'+entry.type+'" data-unstage-id="'+entry.id+'">\u00d7</button></span>';
    }).join('');
  }

  $('transfer-dropzone').addEventListener('click', function(e){
    const type = e.target.getAttribute('data-unstage-type');
    const id = e.target.getAttribute('data-unstage-id');
    if(!id) return;
    stagedTransferEntries = stagedTransferEntries.filter(function(x){ return !(x.type===type && x.id===id); });
    renderDropzoneChips();
  });

  function stageItemForTransfer(type, id){
    const exists = stagedTransferEntries.some(function(x){ return x.type===type && x.id===id; });
    if(!exists) stagedTransferEntries.push({type:type, id:id});
    renderDropzoneChips();
  }

  function handleDropOnTarget(zoneEl, payload){
    const role = zoneEl.getAttribute('data-drop-role');
    if(role === 'transfer'){
      stageItemForTransfer(payload.type, payload.id);
    } else if(role === 'craft-0'){
      setCraftSlot(0, payload);
    } else if(role === 'craft-1'){
      setCraftSlot(1, payload);
    }
  }

  function findDropTargetAtPoint(x, y){
    const candidates = document.querySelectorAll('.drop-target-hover-candidate');
    for(const el of candidates){
      const rect = el.getBoundingClientRect();
      if(rect.width === 0 && rect.height === 0) continue;
      if(x>=rect.left && x<=rect.right && y>=rect.top && y<=rect.bottom) return el;
    }
    return null;
  }

  function makeItemDraggable(el, payload){
    el.setAttribute('draggable', 'true');
    const payloadStr = JSON.stringify(payload);

    el.addEventListener('dragstart', function(e){
      e.dataTransfer.setData('text/plain', payloadStr);
      e.dataTransfer.effectAllowed = 'move';
    });

    el.addEventListener('touchstart', function(e){
      const touch = e.touches[0];
      const ghost = el.cloneNode(true);
      ghost.classList.add('drag-ghost');
      ghost.style.width = el.offsetWidth+'px';
      ghost.style.left = (touch.clientX - el.offsetWidth/2)+'px';
      ghost.style.top = (touch.clientY - el.offsetHeight/2)+'px';
      document.body.appendChild(ghost);
      dragState = { payload: payload, ghostEl: ghost };
      e.preventDefault();
    }, {passive:false});

    el.addEventListener('touchmove', function(e){
      if(!dragState) return;
      e.preventDefault();
      const touch = e.touches[0];
      dragState.ghostEl.style.left = (touch.clientX - el.offsetWidth/2)+'px';
      dragState.ghostEl.style.top = (touch.clientY - el.offsetHeight/2)+'px';
      document.querySelectorAll('.drop-target-hover-candidate').forEach(function(z){
        const rect = z.getBoundingClientRect();
        const over = rect.width>0 && touch.clientX>=rect.left && touch.clientX<=rect.right && touch.clientY>=rect.top && touch.clientY<=rect.bottom;
        z.classList.toggle('dropzone-hover', over);
      });
    }, {passive:false});

    el.addEventListener('touchend', function(e){
      if(!dragState) return;
      const touch = e.changedTouches[0];
      const target = findDropTargetAtPoint(touch.clientX, touch.clientY);
      document.querySelectorAll('.drop-target-hover-candidate').forEach(function(z){ z.classList.remove('dropzone-hover'); });
      if(target) handleDropOnTarget(target, dragState.payload);
      dragState.ghostEl.remove();
      dragState = null;
    });

    el.addEventListener('touchcancel', function(){
      if(dragState){ dragState.ghostEl.remove(); dragState = null; }
    });
  }

  document.querySelectorAll('.drop-target-hover-candidate').forEach(function(zone){
    zone.addEventListener('dragover', function(e){ e.preventDefault(); zone.classList.add('dropzone-hover'); });
    zone.addEventListener('dragleave', function(){ zone.classList.remove('dropzone-hover'); });
    zone.addEventListener('drop', function(e){
      e.preventDefault();
      zone.classList.remove('dropzone-hover');
      const raw = e.dataTransfer.getData('text/plain');
      if(!raw) return;
      try{
        const payload = JSON.parse(raw);
        handleDropOnTarget(zone, payload);
      }catch(err){}
    });
  });

  /* ---- portrait upload (click portrait to change) ---- */

  $('portrait-click-area').addEventListener('click', function(){
    $('pc-image-input').click();
  });

  $('pc-image-input').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
      const img = new Image();
      img.onload = async function(){
        const maxDim = 320;
        let w = img.width, h = img.height;
        if(w > h){ if(w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; } }
        else { if(h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        pendingPortraitDataUrl = canvas.toDataURL('image/jpeg', 0.85);
        $('pc-portrait').src = pendingPortraitDataUrl;
        $('pc-portrait').style.display = 'block';
        $('pc-portrait-placeholder').style.display = 'none';

        const p = currentPortalPlayer();
        if(p){
          p.imageUrl = pendingPortraitDataUrl;
          const ok = await savePlayer(p);
          $('portrait-status').textContent = ok ? '초상화가 저장되었습니다.' : '저장에 실패했습니다.';
          if(ok) logAction(p.name, '초상화 변경', {});
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  $('btn-transfer').addEventListener('click', async function(){
    const p = currentPortalPlayer();
    if(!p) return;
    const targetName = $('transfer-target-input').value.trim();
    if(stagedTransferEntries.length === 0 || !targetName){
      $('transfer-status').textContent = '양도할 아티팩트나 아이템을 끌어다 놓고, 받을 캐릭터 이름을 입력하세요.';
      return;
    }

    const artifactIds = stagedTransferEntries.filter(function(e){ return e.type==='artifact'; }).map(function(e){ return e.id; });
    const itemSourceIds = stagedTransferEntries.filter(function(e){ return e.type==='item'; }).map(function(e){ return e.id; });

    $('transfer-status').textContent = '처리 중...';
    const result = await callServerFunction('transfer', {
      targetName: targetName,
      artifactIds: artifactIds,
      itemSourceIds: itemSourceIds
    });

    if(!result.success){
      $('transfer-status').textContent = result.message || '양도에 실패했습니다.';
      return;
    }

    currentPlayerDoc = await getMyPlayerDoc(p.id);
    stagedTransferEntries = [];
    $('transfer-target-input').value = '';
    $('transfer-status').textContent = (result.labels||[]).join(', ')+'을(를) '+result.toName+'에게 양도했습니다.';
    logAction(p.name, '양도', { to: result.toName, items: result.labels });
    renderPortalChar();
  });

  /* ---- crafting (item + item = item) ---- */

  function setCraftSlot(index, payload){
    if(payload.type !== 'item') return;
    const other = index===0 ? craftSlots[1] : craftSlots[0];
    if(other === payload.id) return;
    craftSlots[index] = payload.id;
    renderCraftSlotsDisplay();
  }

  function renderCraftSlotsDisplay(){
    const p = currentPortalPlayer();
    [0,1].forEach(function(idx){
      const el = $('craft-slot-'+idx);
      const sourceId = craftSlots[idx];
      if(sourceId && p){
        const item = (p.items||[]).find(function(i){ return i.sourceItemId === sourceId; });
        if(item){
          const r = resolveGeneralItem(item);
          el.className = 'craft-slot filled drop-target-hover-candidate';
          el.textContent = r.name || '아이템';
          return;
        }
      }
      el.className = 'craft-slot drop-target-hover-candidate';
      el.textContent = '재료 '+(idx+1);
    });
  }

  $('craft-slot-0').addEventListener('click', function(){ craftSlots[0] = null; renderCraftSlotsDisplay(); });
  $('craft-slot-1').addEventListener('click', function(){ craftSlots[1] = null; renderCraftSlotsDisplay(); });

  $('btn-craft').addEventListener('click', async function(){
    const p = currentPortalPlayer();
    if(!p) return;
    if(!craftSlots[0] || !craftSlots[1]){
      $('craft-status').textContent = '재료 두 개를 모두 놓아주세요.';
      return;
    }
    const catA = craftSlots[0];
    const catB = craftSlots[1];
    const item0 = (p.items||[]).find(function(i){ return i.sourceItemId === catA; });
    const item1 = (p.items||[]).find(function(i){ return i.sourceItemId === catB; });
    if(!item0 || !item1){
      $('craft-status').textContent = '재료를 다시 확인해주세요.';
      craftSlots = [null,null];
      renderCraftSlotsDisplay();
      return;
    }

    $('craft-status').textContent = '조합 중...';
    const result = await callServerFunction('craft', { itemAId: catA, itemBId: catB });

    if(!result.success){
      $('craft-status').textContent = result.message || '조합에 실패했습니다.';
      return;
    }

    currentPlayerDoc = await getMyPlayerDoc(p.id);
    await prefetchCatalogFor(currentPlayerDoc);
    craftSlots = [null, null];
    $('craft-status').textContent = '"'+result.resultName+'"을(를) 조합했습니다!';
    logAction(p.name, '조합', {
      materials: [resolveGeneralItem(item0).name || '아이템', resolveGeneralItem(item1).name || '아이템'],
      result: result.resultName
    });
    renderPortalChar();
  });

  /* ---------- ambient embers ---------- */

  (function spawnEmbers(){
    const field = $('ember-field');
    if(!field) return;
    const count = 10;
    for(let i=0;i<count;i++){
      const el = document.createElement('div');
      el.className = 'ember';
      const size = 2 + Math.random()*2.5;
      el.style.width = size+'px';
      el.style.height = size+'px';
      el.style.left = (10 + Math.random()*80)+'vw';
      el.style.setProperty('--drift', (Math.random()*40-20)+'px');
      el.style.animationDuration = (9 + Math.random()*8)+'s';
      el.style.animationDelay = (Math.random()*10)+'s';
      field.appendChild(el);
    }
  })();

  /* ---------- init ---------- */

  $('player-app').style.display = 'block';

})();
</script>
</body>
